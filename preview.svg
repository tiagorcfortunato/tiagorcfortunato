<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0e"/>
      <stop offset="100%" style="stop-color:#111114"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3a0;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#22d3a0;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow circle top-right -->
  <circle cx="1050" cy="100" r="320" fill="url(#glow)"/>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#222226" stroke-width="2"/>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="3" height="300" fill="#22d3a0" opacity="0.5" rx="2"/>

  <!-- Location line -->
  <rect x="112" y="175" width="28" height="1.5" fill="#22d3a0" rx="1"/>
  <text x="150" y="181" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#22d3a0" font-weight="500" letter-spacing="0.05em">Berlin, Germany</text>

  <!-- Name -->
  <text x="112" y="260" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="72" fill="#e8e8ea" font-weight="800" letter-spacing="-0.04em">Tiago Fortunato</text>

  <!-- Title -->
  <text x="112" y="325" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" fill="#88888f" font-weight="700" letter-spacing="-0.03em">Product Engineer</text>

  <!-- Divider -->
  <rect x="112" y="365" width="120" height="2" fill="#22d3a0" opacity="0.4" rx="1"/>

  <!-- Tags row -->
  <!-- Python tag -->
  <rect x="112" y="390" width="100" height="36" rx="18" fill="#22d3a01a" stroke="#22d3a033" stroke-width="1.5"/>
  <text x="162" y="413" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#22d3a0" font-weight="600" text-anchor="middle">Python</text>

  <!-- FastAPI tag -->
  <rect x="224" y="390" width="104" height="36" rx="18" fill="#22d3a01a" stroke="#22d3a033" stroke-width="1.5"/>
  <text x="276" y="413" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#22d3a0" font-weight="600" text-anchor="middle">FastAPI</text>

  <!-- LLMs tag -->
  <rect x="340" y="390" width="80" height="36" rx="18" fill="#22d3a01a" stroke="#22d3a033" stroke-width="1.5"/>
  <text x="380" y="413" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#22d3a0" font-weight="600" text-anchor="middle">LLMs</text>

  <!-- RAG tag -->
  <rect x="432" y="390" width="74" height="36" rx="18" fill="#22d3a01a" stroke="#22d3a033" stroke-width="1.5"/>
  <text x="469" y="413" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#22d3a0" font-weight="600" text-anchor="middle">RAG</text>

  <!-- Vision AI tag -->
  <rect x="518" y="390" width="110" height="36" rx="18" fill="#141416" stroke="#222226" stroke-width="1.5"/>
  <text x="573" y="413" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#88888f" font-weight="500" text-anchor="middle">Vision AI</text>

  <!-- Next.js tag -->
  <rect x="640" y="390" width="92" height="36" rx="18" fill="#141416" stroke="#222226" stroke-width="1.5"/>
  <text x="686" y="413" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#88888f" font-weight="500" text-anchor="middle">Next.js</text>

  <!-- Description -->
  <text x="112" y="470" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" fill="#88888f" font-weight="400">Shipping AI products end-to-end · LLMs · RAG · Vision AI · SaaS</text>

  <!-- URL bottom right -->
  <text x="1120" y="590" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#333338" font-weight="500" text-anchor="end">www.tifortunato.com</text>

  <!-- TF logo top right -->
  <rect x="1080" y="52" width="60" height="36" rx="8" fill="#141416" stroke="#222226" stroke-width="1.5"/>
  <text x="1110" y="76" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#e8e8ea" font-weight="700" text-anchor="middle" letter-spacing="-0.02em">TF<tspan fill="#22d3a0">.</tspan></text>
</svg>
